<html lang="{{ site.locale | slice: 0,2 }}" class="no-js">

  <body class="stone-site{% if page.url == '/' or page.url == '/index.html' %} stone-site--home{% endif %}{% if page.body_class %} {{ page.body_class }}{% endif %}">
